<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دریافت فایل اختصاصی</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v3.3.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Vazirmatn', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; padding: 40px 15px; }
        
        .bg-shape { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; animation: float 12s infinite alternate ease-in-out; }
        .shape1 { width: 350px; height: 350px; background: rgba(139, 92, 246, 0.25); top: -5%; left: -5%; }
        .shape2 { width: 400px; height: 400px; background: rgba(196, 181, 253, 0.35); bottom: -10%; right: -10%; animation-delay: -6s; }
        @keyframes float { 0% { transform: translateY(0px) scale(1); } 100% { transform: translateY(40px) scale(1.1); } }

        .card { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 28px; padding: 45px 30px; text-align: center; box-shadow: 0 20px 50px -10px rgba(109, 40, 217, 0.1); width: 100%; max-width: 400px; transition: all 0.4s ease; z-index: 10; }
        .icon-box { width: 75px; height: 75px; margin: 0 auto 25px; border-radius: 50%; background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(109, 40, 217, 0.05)); display: flex; justify-content: center; align-items: center; border: 1px solid rgba(139, 92, 246, 0.2); }
        .icon-box svg { width: 34px; height: 34px; fill: #8b5cf6; }
        
        h2 { font-size: 22px; font-weight: 800; margin-bottom: 12px; }
        p.subtitle { color: #64748b; font-size: 14.5px; margin-bottom: 35px; line-height: 1.8; }
        
        .btn { display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; padding: 18px 0; background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%); color: white; border-radius: 16px; font-weight: 700; font-size: 16px; cursor: pointer; border: none; box-shadow: 0 10px 20px rgba(126, 34, 206, 0.2); transition: all 0.3s ease; }
        .btn.disabled { opacity: 0.85; pointer-events: none; }
        .btn.unlocked-btn { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }

        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #error-msg { color: #ef4444; font-size: 13.5px; margin-top: 20px; font-weight: 600; min-height: 20px; opacity: 0; background: rgba(239, 68, 68, 0.05); padding: 10px; border-radius: 8px; transition: opacity 0.3s; }
        #fatal-error { display: none; color: #ef4444; font-weight: bold; text-align: center; background: white; padding: 20px; border-radius: 12px; }

        .gallery-container { width: 100%; max-width: 400px; margin-top: 50px; z-index: 10; display: none; }
        .gallery-title { font-size: 18px; font-weight: 800; color: #334155; margin-bottom: 20px; text-align: center; }
        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .gallery-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.8); border-radius: 16px; padding: 10px; text-decoration: none; color: #1e293b; display: block; }
        .gallery-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; margin-bottom: 10px; background: #e2e8f0; }
        .gallery-card h4 { font-size: 13px; font-weight: 600; text-align: center; }
    </style>
</head>
<body>

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div id="fatal-error">لینک نامعتبر است!</div>

    <div class="card" id="mainBox" style="display: none;">
        <div class="icon-box" id="statusIcon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M144 144v48H304V144c0-44.2-35.8-80-80-80s-80 35.8-80 80zM80 192V144C80 64.5 144.5 0 224 0s144 64.5 144 144v48h16c35.3 0 64 28.7 64 64V448c0 35.3-28.7 64-64 64H64c-35.3 0-64-28.7-64-64V256c0-35.3 28.7-64 64-64H80V144C80 64.5 144.5 0 224 0c70.5 0 129 50.8 141.6 118.7c2.9 15.6-7.5 30.6-23.1 33.5s-30.6-7.5-33.5-23.1C301.9 83.1 266.3 64 224 64z"/></svg>
        </div>
        <h2 id="statusTitle">فایل قفل است</h2>
        <p class="subtitle" id="statusDesc">برای دسترسی، ابتدا پیج را فالو کنید.</p>
        <button id="actionBtn" class="btn">
            <div class="spinner" id="btnSpinner"></div>
            <span id="btnText">فالو کردن پیج</span>
        </button>
        <div id="error-msg">تلاش مجدد (سریع برگشتید!)</div>
    </div>

    <div class="gallery-container" id="galleryContainer">
        <div class="gallery-title">سایر آموزش‌ها و ابزارها</div>
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>

    <script src="posts.js"></script>

    <script>
        window.onload = function() {
            if (window.myPosts && window.myPosts.length > 0) {
                let grid = document.getElementById('galleryGrid');
                window.myPosts.forEach(post => {
                    grid.innerHTML += `<a href="${post.link}" target="_blank" class="gallery-card"><img src="${post.image}" alt="${post.title}" loading="lazy"><h4>${post.title}</h4></a>`;
                });
                document.getElementById('galleryContainer').style.display = 'block';
            }

            const urlParams = new URLSearchParams(window.location.search);
            const data = urlParams.get('data');
            let mainBox = document.getElementById('mainBox');
            let actionBtn = document.getElementById('actionBtn');
            let btnText = document.getElementById('btnText');
            let btnSpinner = document.getElementById('btnSpinner');
            let errorMsg = document.getElementById('error-msg');
            
            if(!data) { document.getElementById('fatal-error').style.display = 'block'; return; }
            
            try {
                let decoded = atob(data);
                let links = decoded.split("|||");
                let pageUrl = links[0].trim();
                let fileUrl = links[1].trim();
                if(pageUrl && !pageUrl.startsWith('http')) pageUrl = 'https://' + pageUrl;
                if(fileUrl && !fileUrl.startsWith('http')) fileUrl = 'https://' + fileUrl;
                mainBox.style.display = 'block';
                
                let isUnlocked = false;
                let clickTime = 0;
                
                actionBtn.addEventListener('click', function() {
                    if(isUnlocked) { window.open(fileUrl, '_blank'); return; }
                    clickTime = Date.now();
                    errorMsg.style.opacity = '0';
                    actionBtn.classList.add('disabled');
                    btnText.innerText = 'منتظر بازگشت...';
                    btnSpinner.style.display = 'block';
                    window.open(pageUrl, '_blank');
                });

                window.addEventListener('focus', function() {
                    if(isUnlocked || clickTime === 0) return;
                    let timeAway = Date.now() - clickTime;
                    if(timeAway < 1500) return;
                    if(timeAway >= 1500 && timeAway < 3500) { 
                        errorMsg.style.opacity = '1'; actionBtn.classList.remove('disabled'); btnSpinner.style.display = 'none'; btnText.innerText = 'تلاش مجدد'; return;
                    }
                    isUnlocked = true;
                    btnText.innerText = 'در حال بررسی... (2)';
                    setTimeout(() => { btnText.innerText = 'در حال بررسی... (1)'; }, 1000);
                    setTimeout(() => {
                        mainBox.classList.add('unlocked'); btnSpinner.style.display = 'none';
                        document.getElementById('statusTitle').innerText = 'قفل باز شد!';
                        actionBtn.classList.remove('disabled'); actionBtn.classList.add('unlocked-btn'); btnText.innerText = 'دانلود فایل';
                    }, 2000);
                });
            } catch(e) { document.getElementById('fatal-error').style.display = 'block'; }
        };
    </script>
</body>
</html>
