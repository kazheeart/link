<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دریافت فایل اختصاصی</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v3.3.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0e0618;
            --surface:   #160d28;
            --border:    rgba(124, 58, 237, 0.18);
            --purple:    #7c3aed;
            --purple-lt: #a78bfa;
            --purple-xs: rgba(124, 58, 237, 0.08);
            --white:     #f8f5ff;
            --muted:     #9585b4;
            --green:     #34d399;
            --green-bg:  rgba(52, 211, 153, 0.08);
            --green-bdr: rgba(52, 211, 153, 0.25);
            --red:       #f87171;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: var(--bg);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ─── کارت ─── */
        .card {
            width: 90%;
            max-width: 360px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 44px 32px 36px;
            text-align: center;
        }

        /* ─── آیکون ─── */
        .icon-ring {
            position: relative;
            width: 72px;
            height: 72px;
            margin: 0 auto 28px;
        }

        .icon-ring::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 1.5px solid var(--purple-lt);
            opacity: 0.45;
            animation: pulse 2.8s ease-in-out infinite;
        }

        .icon-inner {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--purple-xs);
            border: 1px solid rgba(167, 139, 250, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.5s, border-color 0.5s;
        }

        .icon-inner svg {
            width: 28px;
            height: 28px;
            fill: var(--purple-lt);
            transition: fill 0.5s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.45; }
            50%       { transform: scale(1.12); opacity: 0.15; }
        }

        /* ─── متون ─── */
        h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 10px;
            letter-spacing: -0.3px;
        }

        .subtitle {
            font-size: 13.5px;
            color: var(--muted);
            line-height: 1.8;
            margin-bottom: 32px;
        }

        /* ─── دکمه ─── */
        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 15px 0;
            background: var(--purple);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-family: 'Vazirmatn', sans-serif;
            font-weight: 700;
            font-size: 14.5px;
            cursor: pointer;
            border: none;
            transition: background 0.3s, opacity 0.3s, transform 0.2s;
        }

        .btn:hover { background: #6d28d9; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        .btn.loading { opacity: 0.75; pointer-events: none; }

        .btn.success {
            background: transparent;
            border: 1px solid var(--green-bdr);
            color: var(--green);
        }
        .btn.success:hover { background: var(--green-bg); transform: translateY(-2px); }

        /* ─── اسپینر ─── */
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            display: none;
            flex-shrink: 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── پیام خطا ─── */
        #error-msg {
            margin-top: 14px;
            font-size: 12.5px;
            color: var(--red);
            font-weight: 600;
            min-height: 18px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* ─── حالت باز شده ─── */
        .card.unlocked .icon-inner {
            background: var(--green-bg);
            border-color: var(--green-bdr);
        }
        .card.unlocked .icon-inner svg { fill: var(--green); }
        .card.unlocked .icon-ring::before { border-color: var(--green); }

        /* ─── خطای فاتال ─── */
        #fatal-error {
            display: none;
            color: var(--red);
            font-size: 15px;
            font-weight: 700;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="card" id="mainBox">
    <div class="icon-ring">
        <div class="icon-inner" id="iconInner">
            <svg id="iconSvg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                <path d="M144 144v48H304V144c0-44.2-35.8-80-80-80s-80 35.8-80 80zM80 192V144C80 64.5 144.5 0 224 0s144 64.5 144 144v48h16c35.3 0 64 28.7 64 64V448c0 35.3-28.7 64-64 64H64c-35.3 0-64-28.7-64-64V256c0-35.3 28.7-64 64-64H80z"/>
            </svg>
        </div>
    </div>

    <h2 id="statusTitle">فایل قفل است</h2>
    <p class="subtitle" id="statusDesc">برای دسترسی به فایل آموزشی، ابتدا پیج ما را در اینستاگرام دنبال کنید.</p>

    <a href="#" id="actionBtn" class="btn" target="_blank">
        <div class="spinner" id="btnSpinner"></div>
        <span id="btnText">فالو کردن پیج</span>
    </a>

    <div id="error-msg">هنوز فالو نکرده‌اید — دوباره امتحان کنید</div>
</div>

<h3 id="fatal-error">لینک نامعتبر یا دستکاری شده است!</h3>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const data = urlParams.get('data');
    let isUnlocked = false;
    let clickTime = 0;

    if (data) {
        try {
            const decoded = atob(data);
            const links = decoded.split("|||");

            const btn        = document.getElementById('actionBtn');
            const btnText    = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const errorMsg   = document.getElementById('error-msg');
            const card       = document.getElementById('mainBox');
            const statusTitle = document.getElementById('statusTitle');
            const statusDesc  = document.getElementById('statusDesc');
            const iconSvg     = document.getElementById('iconSvg');

            btn.href = links[0];

            btn.addEventListener('click', function () {
                if (isUnlocked) return;

                clickTime = Date.now();
                errorMsg.style.opacity = '0';

                btn.classList.add('loading');
                btnText.innerText = 'در حال انتظار...';

                window.addEventListener('focus', function unlockProcess() {
                    if (isUnlocked) return;

                    const timeAway = Date.now() - clickTime;

                    if (timeAway < 4000) {
                        errorMsg.style.opacity = '1';
                        btn.classList.remove('loading');
                        btnText.innerText = 'تلاش مجدد';
                        window.removeEventListener('focus', unlockProcess);
                        return;
                    }

                    window.removeEventListener('focus', unlockProcess);
                    btnText.innerText = 'در حال بررسی...';
                    btnSpinner.style.display = 'block';
                    btn.removeAttribute('href');

                    setTimeout(() => {
                        isUnlocked = true;
                        card.classList.add('unlocked');
                        btnSpinner.style.display = 'none';
                        btn.classList.remove('loading');

                        statusTitle.innerText = 'قفل باز شد!';
                        statusDesc.innerText = 'ممنون از همراهی‌ات. فایل آماده‌ی دریافت است.';

                        iconSvg.innerHTML = '<path d="M224 64c-44.2 0-80 35.8-80 80v48H384c35.3 0 64 28.7 64 64V448c0 35.3-28.7 64-64 64H64c-35.3 0-64-28.7-64-64V256c0-35.3 28.7-64 64-64H80V144C80 64.5 144.5 0 224 0c70.5 0 129 50.8 141.6 118.7c2.9 15.6-7.5 30.6-23.1 33.5s-30.6-7.5-33.5-23.1C301.9 83.1 266.3 64 224 64z"/>';

                        btn.classList.add('success');
                        btnText.innerText = 'دانلود فایل';
                        btn.href = links[1];
                        btn.setAttribute('target', '_blank');

                    }, 3000);
                });
            });

        } catch (e) {
            document.getElementById('mainBox').style.display = 'none';
            document.getElementById('fatal-error').style.display = 'block';
        }
    } else {
        document.getElementById('mainBox').style.display = 'none';
        document.getElementById('fatal-error').style.display = 'block';
    }
</script>
</body>
</html>
