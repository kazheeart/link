<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دریافت فایل اختصاصی</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v3.3.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        :root { --bg-color: #f8fafc; --text-main: #1e293b; --text-sub: #64748b; --card-bg: rgba(255, 255, 255, 0.75); --card-border: rgba(255, 255, 255, 0.9); --card-shadow: rgba(109, 40, 217, 0.1); --gallery-bg: rgba(255, 255, 255, 0.6); --gallery-border: rgba(255, 255, 255, 0.8); --toast-bg: rgba(239, 68, 68, 0.05); }
        [data-theme="dark"] { --bg-color: #0f172a; --text-main: #f8fafc; --text-sub: #94a3b8; --card-bg: rgba(30, 41, 59, 0.7); --card-border: rgba(51, 65, 85, 0.5); --card-shadow: rgba(0, 0, 0, 0.3); --gallery-bg: rgba(30, 41, 59, 0.5); --gallery-border: rgba(51, 65, 85, 0.4); --toast-bg: rgba(239, 68, 68, 0.15); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Vazirmatn', sans-serif; transition: background-color 0.3s, color 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; padding: 40px 15px; }
        
        .theme-toggle { position: absolute; top: 20px; left: 20px; background: var(--card-bg); border: 1px solid var(--card-border); width: 44px; height: 44px; border-radius: 12px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 12px var(--card-shadow); z-index: 100; }
        .theme-toggle svg { width: 20px; height: 20px; fill: var(--text-main); }

        .bg-shape { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; animation: float 12s infinite alternate ease-in-out; }
        .shape1 { width: 350px; height: 350px; background: rgba(139, 92, 246, 0.2); top: -5%; left: -5%; }
        .shape2 { width: 400px; height: 400px; background: rgba(196, 181, 253, 0.25); bottom: -10%; right: -10%; animation-delay: -6s; }
        @keyframes float { 0% { transform: translateY(0px) scale(1); } 100% { transform: translateY(40px) scale(1.1); } }

        .card { background: var(--card-bg); backdrop-filter: blur(24px); border: 1px solid var(--card-border); border-radius: 28px; padding: 45px 30px; text-align: center; box-shadow: 0 20px 50px -10px var(--card-shadow); width: 100%; max-width: 400px; position: relative; z-index: 10; }
        .icon-box { width: 75px; height: 75px; margin: 0 auto 25px; border-radius: 50%; background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(109, 40, 217, 0.05)); display: flex; justify-content: center; align-items: center; border: 1px solid rgba(139, 92, 246, 0.2); }
        .icon-box svg { width: 34px; height: 34px; fill: #8b5cf6; }
        
        h2 { font-size: 22px; font-weight: 800; margin-bottom: 12px; }
        p.subtitle { color: var(--text-sub); font-size: 14.5px; margin-bottom: 30px; line-height: 1.8; }
        
        .btn { display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; padding: 18px 0; background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%); color: white; border-radius: 16px; font-weight: 700; font-size: 16px; cursor: pointer; border: none; box-shadow: 0 10px 20px rgba(126, 34, 206, 0.2); transition: all 0.3s ease; }
        .btn.disabled { opacity: 0.85; pointer-events: none; }
        .btn.unlocked-btn { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }

        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #error-msg { color: #ef4444; font-size: 13.5px; margin-top: 20px; font-weight: 600; min-height: 20px; opacity: 0; background: var(--toast-bg); padding: 10px; border-radius: 8px; transition: opacity 0.3s; }
        #fatal-error { display: none; color: #ef4444; font-weight: bold; text-align: center; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--card-border); }

        .download-counter { font-size: 13px; color: var(--text-sub); margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 6px; font-weight: 600; }
        .download-counter svg { width: 15px; height: 15px; fill: #10b981; }

        .footer-tools { display: flex; flex-direction: column; align-items: center; margin-top: 30px; gap: 10px; z-index: 10; }
        .report-btn { font-size: 13px; color: var(--text-sub); text-decoration: none; display: flex; align-items: center; gap: 5px; font-weight: 600; padding: 6px 12px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; }
        
        .gallery-container { width: 100%; max-width: 400px; margin-top: 40px; z-index: 10; display: none; }
        .gallery-title { font-size: 18px; font-weight: 800; color: var(--text-main); margin-bottom: 20px; text-align: center; }
        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .gallery-card { background: var(--gallery-bg); backdrop-filter: blur(10px); border: 1px solid var(--gallery-border); border-radius: 16px; padding: 10px; text-decoration: none; color: var(--text-main); display: block; }
        .gallery-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; margin-bottom: 10px; background: #e2e8f0; }
        .gallery-card h4 { font-size: 13px; font-weight: 600; text-align: center; }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeToggle">
        <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M223.5 32C116 43.7 32 135 32 245.8 32 358.4 118.6 448 228 448c54 0 107-21.6 146.7-60.9 7-7 2-18.8-7.8-18.8-15.1 0-30.1-1.3-44.8-3.9-92.3-16.5-164.1-91.1-177.6-184.3-5.2-35.7.5-71.2 15.6-103 4.1-8.5-.5-18.7-9.7-18.7H223.5z"/></svg>
    </button>

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div id="fatal-error">لینک نامعتبر است!</div>

    <div class="card" id="mainBox" style="display: none;">
        <div class="icon-box" id="statusIcon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M144 144v48H304V144c0-44.2-35.8-80-80-80s-80 35.8-80 80zM80 192V144C80 64.5 144.5 0 224 0s144 64.5 144 144v48h16c35.3 0 64 28.7 64 64V448c0 35.3-28.7 64-64 64H64c-35.3 0-64-28.7-64-64V256c0-35.3 28.7-64 64-64H80V144C80 64.5 144.5 0 224 0c70.5 0 129 50.8 141.6 118.7c2.9 15.6-7.5 30.6-23.1 33.5s-30.6-7.5-33.5-23.1C301.9 83.1 266.3 64 224 64z"/></svg>
        </div>
        <h2 id="statusTitle">فایل قفل است</h2>
        <p class="subtitle" id="statusDesc">برای دسترسی، ابتدا پیج را فالو کنید.</p>
        <button id="actionBtn" class="btn">
            <div class="spinner" id="btnSpinner"></div>
            <span id="btnText">فالو کردن پیج</span>
        </button>
        <div class="download-counter">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zM369 209L241 337c-9.4 9.4-24.6 9.4-33.9 0l-64-64c-9.4-9.4-9.4-24.6 0-33.9s24.6-9.4 33.9 0l47 47L335 175c9.4-9.4 24.6-9.4 33.9 0s9.4 24.6 0 33.9z"/></svg>
            <span id="counterText"></span>
        </div>
        <div id="error-msg">تلاش مجدد (سریع برگشتید!)</div>
    </div>

    <div class="footer-tools" id="footerTools" style="display: none;">
        <a href="https://t.me/Kazhe_Art" target="_blank" class="report-btn">گزارش خرابی لینک</a>
    </div>

    <div class="gallery-container" id="galleryContainer">
        <div class="gallery-title">سایر آموزش‌ها و ابزارها</div>
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>

    <script src="posts.js"></script>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        themeToggle.addEventListener('click', () => {
            let isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('theme', 'light'); }
            else { document.documentElement.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark'); }
        });

        // شمارشگر جهانی
        fetch(`https://api.countapi.xyz/hit/kazhe_file_counter/visits`)
            .then(res => res.json())
            .then(data => { document.getElementById('counterText').innerText = `تا این لحظه ${data.value} نفر این فایل را دریافت کرده‌اند`; })
            .catch(() => { document.getElementById('counterText').innerText = `بیش از ۳۰۰ نفر این فایل را دریافت کرده‌اند`; });

        window.onload = function() {
            if (window.myPosts && window.myPosts.length > 0) {
                let grid = document.getElementById('galleryGrid');
                window.myPosts.forEach(post => {
                    grid.innerHTML += `<a href="${post.link}" target="_blank" class="gallery-card"><img src="${post.image}" alt="${post.title}" loading="lazy"><h4>${post.title}</h4></a>`;
                });
                document.getElementById('galleryContainer').style.display = 'block';
            }

            const urlParams = new URLSearchParams(window.location.search);
            const data = urlParams.get('data');
            let mainBox = document.getElementById('mainBox');
            let footerTools = document.getElementById('footerTools');
            let actionBtn = document.getElementById('actionBtn');
            let btnText = document.getElementById('btnText');
            let btnSpinner = document.getElementById('btnSpinner');
            let errorMsg = document.getElementById('error-msg');
            
            if(!data) { document.getElementById('fatal-error').style.display = 'block'; return; }
            
            try {
                let decoded = atob(data);
                let links = decoded.split("|||");
                let pageUrl = links[0].trim();
                let fileUrl = links[1].trim();
                if(pageUrl && !pageUrl.startsWith('http')) pageUrl = 'https://' + pageUrl;
                if(fileUrl && !fileUrl.startsWith('http')) fileUrl = 'https://' + fileUrl;
                mainBox.style.display = 'block';
                footerTools.style.display = 'flex';
                
                let isUnlocked = false;
                let clickTime = 0;
                
                actionBtn.addEventListener('click', function() {
                    if(isUnlocked) { window.open(fileUrl, '_blank'); return; }
                    clickTime = Date.now();
                    errorMsg.style.opacity = '0';
                    actionBtn.classList.add('disabled');
                    btnText.innerText = 'منتظر بازگشت...';
                    btnSpinner.style.display = 'block';
                    window.open(pageUrl, '_blank');
                });

                window.addEventListener('focus', function() {
                    if(isUnlocked || clickTime === 0) return;
                    let timeAway = Date.now() - clickTime;
                    if(timeAway < 1500) return;
                    if(timeAway >= 1500 && timeAway < 3500) { 
                        errorMsg.style.opacity = '1'; actionBtn.classList.remove('disabled'); btnSpinner.style.display = 'none'; btnText.innerText = 'تلاش مجدد'; return;
                    }
                    
                    isUnlocked = true;
                    let countdown = 5; 
                    btnSpinner.style.display = 'block';
                    
                    let timerInterval = setInterval(() => {
                        btnText.innerText = `در حال بررسی... (${countdown})`;
                        countdown--;
                        if(countdown < 0) {
                            clearInterval(timerInterval);
                            mainBox.classList.add('unlocked'); btnSpinner.style.display = 'none';
                            document.getElementById('statusTitle').innerText = 'قفل باز شد!';
                            actionBtn.classList.remove('disabled'); actionBtn.classList.add('unlocked-btn'); btnText.innerText = 'دانلود فایل';
                        }
                    }, 1000);
                });
            } catch(e) { document.getElementById('fatal-error').style.display = 'block'; }
        };
    </script>
</body>
</html>
